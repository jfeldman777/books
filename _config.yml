title: Yakov Feldman
description: Toward a science of persons, tasks, and communities
author: Yakov Feldman
url: "https://jfeldman777.github.io"
baseurl: "/books"
lang: en

# FormSubmit endpoint — set your email to receive feedback:
# feedback_action: "https://formsubmit.co/your@email.com"
feedback_action:

markdown: kramdown
kramdown:
  input: GFM
  relative_links:
    enabled: true
    config: all

permalink: /:name/

defaults:
  - scope:
      path: "index.md"
    values:
      layout: home
  - scope:
      path: ""
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
